# Debug config: CIFAR-10, for fast iteration. Same pipeline, smaller images.
dataset:
  name: cifar10
  root: data
  image_size: 32

model:
  backbone: resnet18
  projector_hidden: [1024, 1024]
  projector_output: 128

augmentation:
  crop_scale: [0.3, 1.0]
  jitter_strength: 0.4
  grayscale_p: 0.2
  blur_p: 0.2

loader:
  batch_size: 128
  num_workers: 2

experiment:
  name: naive  # naive | barlow_twins | vicreg

loss:
  # Barlow Twins
  lambda_offdiag: 5.0e-3
  # VICReg
  lambda_inv: 25.0
  mu_var: 25.0
  nu_cov: 1.0
  gamma: 1.0

training:
  epochs: 5
  lr: 3.0e-4
  weight_decay: 1.0e-6
  output_dir: results/checkpoints

seed: 0
