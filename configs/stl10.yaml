# Main experiment config: STL-10 (unlabeled for SSL, labeled splits for the linear probe).
dataset:
  name: stl10
  root: data
  image_size: 96

model:
  backbone: resnet18
  projector_hidden: [1024, 1024]
  projector_output: 128

augmentation:
  crop_scale: [0.3, 1.0]
  jitter_strength: 0.4
  grayscale_p: 0.2
  blur_p: 0.5

loader:
  batch_size: 256
  num_workers: 4

experiment:
  name: naive  # naive | barlow_twins | vicreg

loss:
  # Barlow Twins
  lambda_offdiag: 5.0e-3
  # VICReg
  lambda_inv: 25.0
  mu_var: 25.0
  nu_cov: 1.0
  gamma: 1.0

training:
  epochs: 50
  lr: 3.0e-4
  weight_decay: 1.0e-6
  output_dir: results/checkpoints

seed: 0
